<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل المنظومة الرقمية الموحدة</title>
    <!-- استيراد خطوط ومكتبة أيقونات FontAwesome لشكل احترافي -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التنسيق العام للخلفية */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a446c; /* اللون الأزرق الداكن الفخم للمنظومة */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* كارت التفعيل الأبيض وسط الشاشة */
        .activation-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
            box-sizing: border-box;
        }

        /* عنوان شاشة التفعيل */
        .activation-title {
            color: #1a446c;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* النص الفرعي التوضيحي */
        .activation-desc {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* حقل إدخال كود التفعيل */
        .activation-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #dcdde1;
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            color: #2c3e50;
            letter-spacing: 2px;
            transition: border-color 0.3s ease;
        }

        .activation-input:focus {
            border-color: #1a446c;
            outline: none;
        }

        /* زر التحقق والتفعيل الأساسي (الأخضر) */
        .btn-activate {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #27ae60;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-activate:hover {
            background-color: #219653;
        }

        .btn-activate:active {
            transform: scale(0.98);
        }

        /* زر طلب الاشتراك الجديد (الذهبي الفخم المتناسق مع الهوية الأزهرية) */
        .btn-request-activation {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            color: #b38f00; /* ذهبي أزهري */
            background-color: transparent;
            border: 2px dashed #b38f00; /* إطار متقطع يعبر عن التفعيل والاشتراكات */
            border-radius: 10px;
            text-decoration: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-request-activation:hover {
            background-color: #b38f00;
            color: #ffffff;
            border-style: solid;
            box-shadow: 0px 4px 12px rgba(179, 143, 0, 0.35);
        }
    </style>
</head>
<body>

    <!-- كارت التفعيل -->
    <div class="activation-card">
        
        <!-- العنوان والأيقونة -->
        <div class="activation-title">
            <i class="fa-solid fa-key"></i> تفعيل النسخة المعتمدة
        </div>
        
        <!-- الوصف -->
        <p class="activation-desc">
            يرجى إدخال كود التفعيل الخاص بالمنظومة للوصول إلى لوحة إدارة الجداول السحابية لعام 2027.
        </p>
        
        <!-- حقل كود التفعيل -->
        <input type="text" class="activation-input" placeholder="AZH27-xxxx" id="activationCode">
        
        <!-- زر التفعيل الأخضر الحالي -->
        <button class="btn-activate" onclick="verifyCode()">
            <i class="fa-solid fa-unlock-keyhole"></i> تحقق وتفعيل المنظومة الآن
        </button>
        
        <!-- الزر الجديد: طلب كود تفعيل (يوجه العميل لدردشة فيسبوك مباشرة) -->
        <a href="https://www.facebook.com/messages/e2ee/t/1380707073909656?locale=ar_AR" target="_blank" class="btn-request-activation">
            <i class="fa-solid fa-comments"></i> لا تملك كود تفعيل؟ اطلب كود المعهد الآن
        </a>

    </div>

    <script>
        // دالة التحقق التجريبية (يمكنك ربطها بنظام التفعيل الخاص بك)
        function verifyCode() {
            var code = document.getElementById('activationCode').value;
            if(code.trim() === "") {
                alert("برجاء إدخال كود التفعيل أولاً!");
            } else {
                alert("جاري التحقق من الكود...");
                // هنا يتم وضع الكود البرمجي الخاص بـ دالة التحقق الحقيقية الخاصة بك
            }
        }
    </script>
</body>
</html>
